name: digital_trade_mobile_app
description: "Digital Trade mobile application — scalable Flutter client."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Functional error handling
  fpdart: ^1.1.1

  # Models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Dependency injection
  get_it: ^8.0.3

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Localization
  intl: ^0.20.2

  # Utilities
  equatable: ^2.0.5
  logger: ^2.5.0
  connectivity_plus: ^6.1.0

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16

  # Env
  flutter_dotenv: ^5.2.1

  # Media
  image_picker: ^1.1.2

  # Charts
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # Testing
  mocktail: ^1.0.4

  # App icon & splash generators (run once via `dart run ...`)
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/i18n/
    - .env
    - .env.dev
    - .env.staging
    - .env.prod

# Run: `dart run flutter_launcher_icons`
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

# Run: `dart run flutter_native_splash:create`
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icons/app_icon_foreground.png"
  android_12:
    image: "assets/icons/app_icon_foreground.png"
    icon_background_color: "#FFFFFF"
  android: true
  ios: true
  web: false
